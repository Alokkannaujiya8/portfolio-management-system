<div class="container my-5 pt-4">
  <div class="text-center mb-5">
    <span class="section-subtitle">Showcase</span>
    <h2 class="section-title">My Gallery</h2>
    <div class="title-underline mb-4"></div>
    
    <!-- Filter Tabs -->
    <div class="d-flex justify-content-center gap-2 flex-wrap mb-3">
      <button (click)="filterByType('')" class="btn btn-outline-primary rounded-pill px-4" [class.active]="selectedType === ''">All</button>
      <button (click)="filterByType('Image')" class="btn btn-outline-primary rounded-pill px-4" [class.active]="selectedType === 'Image'">Images</button>
      <button (click)="filterByType('Video')" class="btn btn-outline-primary rounded-pill px-4" [class.active]="selectedType === 'Video'">Videos</button>
    </div>

    <!-- Category Filters -->
    <div class="d-flex justify-content-center gap-2 flex-wrap small">
      <button (click)="filterByCategory('')" class="btn btn-sm btn-link text-decoration-none" [class.fw-bold]="selectedCategory === ''">All Categories</button>
      <button *ngFor="let cat of categories" (click)="filterByCategory(cat)" class="btn btn-sm btn-link text-decoration-none" [class.fw-bold]="selectedCategory === cat">
        #{{ cat }}
      </button>
    </div>
  </div>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="text-muted mt-2">Loading gallery...</p>
  </div>

  <div *ngIf="!isLoading && getFilteredItems().length === 0" class="text-center py-5">
    <i class="far fa-images fa-4x text-muted mb-3"></i>
    <h4 class="text-dark">No gallery items found</h4>
  </div>

  <!-- Gallery Grid -->
  <div *ngIf="!isLoading && getFilteredItems().length > 0" class="row g-4">
    <div *ngFor="let item of getFilteredItems()" class="col-sm-6 col-md-4 col-lg-3">
      <div (click)="openLightbox(item)" class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden position-relative hover-lift" style="cursor: pointer;">
        
        <!-- Media Preview -->
        <div class="position-relative overflow-hidden" style="height: 200px;">
          <img *ngIf="item.mediaType !== 'Video'" [src]="assetUrl(item.thumbnailPath || item.mediaPath)" [alt]="item.title" class="w-100 h-100 object-fit-cover">
          <div *ngIf="item.mediaType === 'Video'" class="w-100 h-100 d-flex align-items-center justify-content-center bg-dark text-white position-relative">
            <img *ngIf="item.thumbnailPath" [src]="assetUrl(item.thumbnailPath)" [alt]="item.title" class="w-100 h-100 object-fit-cover opacity-50">
            <i class="fas fa-play-circle fa-3x text-white position-absolute z-3"></i>
          </div>
          
          <div class="position-absolute top-3 end-3 badge bg-dark bg-opacity-75 rounded-pill px-3 py-1 font-monospace small">
            {{ item.mediaType }}
          </div>
        </div>

        <div class="card-body p-3">
          <h6 class="card-title text-dark fw-bold mb-1">{{ item.title || 'Untitled' }}</h6>
          <p class="card-text text-muted small mb-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">{{ item.description }}</p>
          
          <div class="d-flex justify-content-between align-items-center text-muted small">
            <span><i class="far fa-eye me-1"></i> {{ item.viewCount || 0 }}</span>
            <button *ngIf="item.mediaType === 'Document' || item.mediaType === 'Image'" (click)="downloadItem($event, item)" class="btn btn-sm btn-link text-decoration-none p-0">
              <i class="fas fa-download me-1"></i> Download
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Lightbox Modal -->
<div *ngIf="selectedItem" class="modal fade show d-block" tabindex="-1" style="background: rgba(0,0,0,0.85); z-index: 1050;">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-transparent border-0">
      <div class="modal-header border-0 pb-0 justify-content-end">
        <button (click)="closeLightbox()" type="button" class="btn-close btn-close-white" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center p-4">
        <!-- Render Image -->
        <img *ngIf="selectedItem.mediaType !== 'Video'" [src]="assetUrl(selectedItem.mediaPath)" [alt]="selectedItem.title" class="img-fluid rounded-4 shadow-lg" style="max-height: 70vh;">
        
        <!-- Render Youtube/Video Embed -->
        <div *ngIf="selectedItem.mediaType === 'Video' && safeVideoUrl" class="ratio ratio-16x9 rounded-4 overflow-hidden shadow-lg">
          <iframe [src]="safeVideoUrl" title="YouTube video" allowfullscreen></iframe>
        </div>

        <div class="text-white mt-3 bg-dark bg-opacity-70 p-3 rounded-4">
          <h5 class="fw-bold mb-1">{{ selectedItem.title || 'Untitled' }}</h5>
          <p class="mb-0 small opacity-75">{{ selectedItem.description }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
