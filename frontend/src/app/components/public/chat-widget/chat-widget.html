<!-- Floating Chat Widget Toggle Button -->
<div class="chat-toggle-btn shadow-lg" (click)="toggleChat()" [class.active]="isOpen"
     style="position: fixed; bottom: 30px; right: 30px; z-index: 1000; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s;">
  <i class="fas" [class.fa-comments]="!isOpen" [class.fa-times]="isOpen" style="font-size: 1.5rem;"></i>
  <span *ngIf="!isOpen && userCount > 0" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
    {{ userCount }}
  </span>
</div>

<!-- Chat Window Panel -->
<div *ngIf="isOpen" class="chat-window shadow-lg border-0 bg-white rounded-4 overflow-hidden"
     style="position: fixed; bottom: 100px; right: 30px; z-index: 1000; width: 360px; height: 500px; display: flex; flex-direction: column; transition: all 0.3s; box-shadow: 0 10px 40px rgba(0,0,0,0.15);">
  
  <!-- Header -->
  <div class="chat-header text-white p-3 d-flex justify-content-between align-items-center"
       style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="d-flex align-items-center gap-2">
      <i class="fas fa-circle text-success small animate-pulse"></i>
      <div>
        <h6 class="mb-0 fw-bold">Live Support Chat</h6>
        <small class="opacity-75">{{ userCount }} users active</small>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="chat-body flex-grow-1 p-3 bg-light overflow-auto" #scrollContainer style="overflow-y: auto;">
    
    <!-- Join Chat Form (if not joined yet) -->
    <div *ngIf="!joined" class="d-flex flex-column align-items-center justify-content-center h-100 text-center px-3">
      <i class="fas fa-user-circle fa-4x text-primary mb-3"></i>
      <h5 class="text-dark fw-bold">Join the Chat</h5>
      <p class="text-muted small">Enter your name to start chatting with the Portfolio Owner.</p>
      
      <div class="input-group mt-2">
        <input type="text" [(ngModel)]="userName" class="form-control rounded-start-pill" placeholder="Your name" (keyup.enter)="joinChat()">
        <button (click)="joinChat()" class="btn btn-primary rounded-end-pill px-4" [disabled]="!userName.trim()">Join</button>
      </div>
    </div>

    <!-- Messages List (if joined) -->
    <div *ngIf="joined" class="d-flex flex-column gap-2">
      <div *ngFor="let msg of messages" class="d-flex flex-column" 
           [class.align-items-end]="msg.isSelf" 
           [class.align-items-start]="!msg.isSelf && msg.user !== 'System'"
           [class.align-items-center]="msg.user === 'System'">
        
        <!-- System Message -->
        <span *ngIf="msg.user === 'System'" class="badge bg-secondary-subtle text-secondary my-1 px-3 py-1 rounded-pill small">
          {{ msg.message }}
        </span>

        <!-- Regular Messages -->
        <div *ngIf="msg.user !== 'System'" class="d-flex flex-column max-w-75">
          <small class="text-muted mb-1 font-monospace" style="font-size: 0.75rem;" *ngIf="!msg.isSelf">
            {{ msg.user }}
          </small>
          
          <div class="p-3 rounded-4 shadow-sm text-wrap" 
               [style.background]="msg.isSelf ? 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' : '#ffffff'"
               [style.color]="msg.isSelf ? '#ffffff' : '#333333'"
               [style.border-bottom-right-radius]="msg.isSelf ? '0px' : '15px'"
               [style.border-bottom-left-radius]="msg.isSelf ? '15px' : '0px'">
            <p class="mb-0 small" style="word-break: break-word;">{{ msg.message }}</p>
          </div>
          
          <small class="text-muted mt-1 small" [class.text-end]="msg.isSelf" style="font-size: 0.7rem;">
            {{ msg.time }}
          </small>
        </div>
      </div>
    </div>

  </div>

  <!-- Footer Input Area -->
  <div *ngIf="joined" class="chat-footer p-3 bg-white border-top">
    <div class="input-group">
      <input type="text" [(ngModel)]="messageText" class="form-control rounded-start-pill border-2" 
             placeholder="Type your message..." (keyup.enter)="sendMessage()">
      <button (click)="sendMessage()" class="btn btn-primary rounded-end-pill px-4" [disabled]="!messageText.trim()">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>
</div>
