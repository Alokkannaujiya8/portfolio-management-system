<div class="container-fluid">
  <div class="row g-4">
    <!-- Add/Edit Form -->
    <div class="col-md-4">
      <div class="card border-0 shadow-sm rounded-4 p-4">
        <h5 class="text-dark fw-bold mb-4">{{ isEditMode ? 'Edit Project' : 'Add New Project' }}</h5>
        
        <form (ngSubmit)="onSubmit()" #projectForm="ngForm">
          <div class="mb-3">
            <label for="projectName" class="form-label fw-bold text-muted small">Project Name *</label>
            <input type="text" id="projectName" name="projectName" class="form-control rounded-3" placeholder="Project Name" required [(ngModel)]="model.projectName">
          </div>

          <div class="mb-3">
            <label for="description" class="form-label fw-bold text-muted small">Description *</label>
            <textarea id="description" name="description" class="form-control rounded-3" rows="3" placeholder="Project Description" required [(ngModel)]="model.description"></textarea>
          </div>

          <div class="mb-3">
            <label for="gitHubLink" class="form-label fw-bold text-muted small">GitHub Link</label>
            <input type="text" id="gitHubLink" name="gitHubLink" class="form-control rounded-3" placeholder="https://github.com/..." [(ngModel)]="model.gitHubLink">
          </div>

          <div class="mb-3">
            <label for="liveLink" class="form-label fw-bold text-muted small">Live Preview Link</label>
            <input type="text" id="liveLink" name="liveLink" class="form-control rounded-3" placeholder="https://..." [(ngModel)]="model.liveLink">
          </div>

          <div class="mb-4">
            <label for="imageFile" class="form-label fw-bold text-muted small">Project Cover Image</label>
            <input type="file" id="imageFile" (change)="onFileChange($event)" accept="image/*" class="form-control rounded-pill mb-2">
            <img *ngIf="model.imagePath && !imageFile" [src]="assetUrl(model.imagePath)" alt="Cover" class="img-thumbnail rounded-3 mt-2" style="max-height: 100px;">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" [disabled]="projectForm.invalid || isSaving" class="btn btn-primary rounded-pill px-4 flex-grow-1">
              <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2"></span>
              {{ isEditMode ? 'Update' : 'Add' }}
            </button>
            <button *ngIf="isEditMode" type="button" (click)="onCancel()" class="btn btn-outline-secondary rounded-pill px-3">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Projects Directory Table -->
    <div class="col-md-8">
      <div class="card border-0 shadow-sm rounded-4 p-4">
        <h5 class="text-dark fw-bold mb-4">Projects Directory</h5>

        <div *ngIf="successMessage" class="alert alert-success rounded-3 small py-2">{{ successMessage }}</div>
        <div *ngIf="errorMessage" class="alert alert-danger rounded-3 small py-2">{{ errorMessage }}</div>

        <div *ngIf="isLoading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
        </div>

        <div *ngIf="!isLoading" class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr class="small text-muted text-uppercase">
                <th>Cover</th>
                <th>Project Name</th>
                <th>Description</th>
                <th>Links</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let proj of projects">
                <td>
                  <img [src]="assetUrl(proj.imagePath) || 'assets/img/blog-default.jpg'" alt="Proj Cover" class="rounded-3" style="width: 60px; height: 50px; object-fit: cover;">
                </td>
                <td><strong>{{ proj.projectName }}</strong></td>
                <td style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{ proj.description }}</td>
                <td>
                  <a *ngIf="proj.gitHubLink" [href]="proj.gitHubLink" target="_blank" class="btn btn-sm btn-light rounded-circle me-1" title="GitHub"><i class="fab fa-github"></i></a>
                  <a *ngIf="proj.liveLink" [href]="proj.liveLink" target="_blank" class="btn btn-sm btn-light rounded-circle" title="Live"><i class="fas fa-external-link-alt"></i></a>
                </td>
                <td class="text-end">
                  <button (click)="onEdit(proj)" class="btn btn-sm btn-outline-primary rounded-circle me-1" title="Edit">
                    <i class="fas fa-edit"></i>
                  </button>
                  <button (click)="onDelete(proj.projectId)" class="btn btn-sm btn-outline-danger rounded-circle" title="Delete">
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
              <tr *ngIf="projects.length === 0">
                <td colspan="5" class="text-center text-muted py-3">No projects added yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
