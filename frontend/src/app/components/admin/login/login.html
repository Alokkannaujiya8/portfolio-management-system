<div class="d-flex align-items-center justify-content-center min-vh-100" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);">
  <div class="card shadow-lg p-4 rounded-4 text-white" style="width: 100%; max-width: 400px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
    <div class="text-center mb-4">
      <i class="fas fa-lock fa-3x text-warning mb-3"></i>
      <h3 class="fw-bold">Admin Console</h3>
      <p class="text-muted small">Access dashboard controls</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger py-2 rounded-3 text-center small" role="alert">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="mb-3">
        <label for="username" class="form-label small fw-bold">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 text-white-50"><i class="fas fa-user"></i></span>
          <input type="text" id="username" name="username" class="form-control bg-transparent border-start-0 text-white" 
                 placeholder="Username" required [(ngModel)]="model.username" style="box-shadow: none;">
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label small fw-bold">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 text-white-50"><i class="fas fa-key"></i></span>
          <input type="password" id="password" name="password" class="form-control bg-transparent border-start-0 text-white" 
                 placeholder="Password" required [(ngModel)]="model.password" style="box-shadow: none;">
        </div>
      </div>

      <button type="submit" class="btn btn-warning btn-lg w-100 py-3 rounded-pill text-dark fw-bold shadow" 
              [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"></span>
        <span *ngIf="isLoading">Verifying...</span>
        <span *ngIf="!isLoading">Login <i class="fas fa-sign-in-alt ms-2"></i></span>
      </button>

      <div class="text-center mt-3">
        <a routerLink="/" class="text-white-50 small text-decoration-none hover-white"><i class="fas fa-arrow-left me-1"></i> Back to Site</a>
      </div>
    </form>
  </div>
</div>
