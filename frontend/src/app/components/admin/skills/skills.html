<div class="container-fluid">
  <div class="row g-4">
    <!-- Add/Edit Form -->
    <div class="col-md-4">
      <div class="card border-0 shadow-sm rounded-4 p-4">
        <h5 class="text-dark fw-bold mb-4">{{ isEditMode ? 'Edit Skill' : 'Add New Skill' }}</h5>
        
        <form (ngSubmit)="onSubmit()" #skillForm="ngForm">
          <div class="mb-3">
            <label for="skillName" class="form-label fw-bold text-muted small">Skill Name *</label>
            <input type="text" id="skillName" name="skillName" class="form-control rounded-3" placeholder="e.g. Angular, C#" required [(ngModel)]="model.skillName">
          </div>

          <div class="mb-4">
            <label for="percentage" class="form-label fw-bold text-muted small">Proficiency Percentage ({{ model.percentage }}%)</label>
            <input type="range" id="percentage" name="percentage" class="form-range" min="0" max="100" required [(ngModel)]="model.percentage">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" [disabled]="skillForm.invalid || isSaving" class="btn btn-primary rounded-pill px-4 flex-grow-1">
              <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2"></span>
              {{ isEditMode ? 'Update' : 'Add' }}
            </button>
            <button *ngIf="isEditMode" type="button" (click)="onCancel()" class="btn btn-outline-secondary rounded-pill px-3">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Skills List -->
    <div class="col-md-8">
      <div class="card border-0 shadow-sm rounded-4 p-4">
        <h5 class="text-dark fw-bold mb-4">Skills Directory</h5>

        <div *ngIf="successMessage" class="alert alert-success rounded-3 small py-2">{{ successMessage }}</div>
        <div *ngIf="errorMessage" class="alert alert-danger rounded-3 small py-2">{{ errorMessage }}</div>

        <div *ngIf="isLoading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
        </div>

        <div *ngIf="!isLoading" class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr class="small text-muted text-uppercase">
                <th>Skill Name</th>
                <th>Percentage</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let skill of skills">
                <td><strong>{{ skill.skillName }}</strong></td>
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <div class="progress flex-grow-1" style="height: 6px; width: 100px;">
                      <div class="progress-bar" role="progressbar" [style.width.%]="skill.percentage"></div>
                    </div>
                    <span class="small font-monospace">{{ skill.percentage }}%</span>
                  </div>
                </td>
                <td class="text-end">
                  <button (click)="onEdit(skill)" class="btn btn-sm btn-outline-primary rounded-circle me-1" title="Edit">
                    <i class="fas fa-edit"></i>
                  </button>
                  <button (click)="onDelete(skill.skillId)" class="btn btn-sm btn-outline-danger rounded-circle" title="Delete">
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
              <tr *ngIf="skills.length === 0">
                <td colspan="3" class="text-center text-muted py-3">No skills added yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
