<div class="container-fluid">
  <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
    <h2 class="text-dark fw-bold mb-4">Manage Profile</h2>

    <div *ngIf="isLoading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div *ngIf="!isLoading">
      <div *ngIf="successMessage" class="alert alert-success rounded-3">{{ successMessage }}</div>
      <div *ngIf="errorMessage" class="alert alert-danger rounded-3">{{ errorMessage }}</div>

      <form (ngSubmit)="onSubmit()" #profileForm="ngForm" class="row g-4">
        
        <!-- Left Column: Fields -->
        <div class="col-md-8">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="name" class="form-label fw-bold text-muted small">Full Name *</label>
              <input type="text" id="name" name="name" class="form-control rounded-3" required [(ngModel)]="profile.name">
            </div>

            <div class="col-md-6">
              <label for="title" class="form-label fw-bold text-muted small">Profile Title *</label>
              <input type="text" id="title" name="title" class="form-control rounded-3" required [(ngModel)]="profile.title">
            </div>

            <div class="col-12">
              <label for="description" class="form-label fw-bold text-muted small">Description/Bio *</label>
              <textarea id="description" name="description" class="form-control rounded-3" rows="4" required [(ngModel)]="profile.description"></textarea>
            </div>

            <div class="col-md-6">
              <label for="email" class="form-label fw-bold text-muted small">Contact Email *</label>
              <input type="email" id="email" name="email" class="form-control rounded-3" required [(ngModel)]="profile.email">
            </div>

            <div class="col-md-6">
              <label for="phone" class="form-label fw-bold text-muted small">Phone Number</label>
              <input type="text" id="phone" name="phone" class="form-control rounded-3" [(ngModel)]="profile.phone">
            </div>

            <div class="col-12">
              <label for="address" class="form-label fw-bold text-muted small">Address</label>
              <input type="text" id="address" name="address" class="form-control rounded-3" [(ngModel)]="profile.address">
            </div>

            <div class="col-md-6">
              <label for="linkedIn" class="form-label fw-bold text-muted small">LinkedIn URL</label>
              <input type="text" id="linkedIn" name="linkedIn" class="form-control rounded-3" placeholder="https://linkedin.com/in/username" [(ngModel)]="profile.linkedIn">
            </div>

            <div class="col-md-6">
              <label for="gitHub" class="form-label fw-bold text-muted small">GitHub URL</label>
              <input type="text" id="gitHub" name="gitHub" class="form-control rounded-3" placeholder="https://github.com/username" [(ngModel)]="profile.gitHub">
            </div>
          </div>
        </div>

        <!-- Right Column: Avatar & File Uploads -->
        <div class="col-md-4 d-flex flex-column align-items-center border-start ps-4">
          
          <!-- Avatar Preview -->
          <div class="avatar-wrapper mb-4 text-center">
            <label class="fw-bold text-muted small mb-2 d-block">Profile Photo</label>
            <div class="rounded-circle overflow-hidden shadow-sm border border-3 border-light mb-3" style="width: 150px; height: 150px;">
              <img [src]="assetUrl(profile.photo) || 'assets/img/default-avatar.png'" alt="Avatar" class="w-100 h-100 object-fit-cover">
            </div>
            <input type="file" (change)="onPhotoChange($event)" accept="image/*" class="form-control form-control-sm rounded-pill">
          </div>

          <!-- CV PDF Upload -->
          <div class="cv-wrapper w-100 mt-3">
            <label class="fw-bold text-muted small mb-2 d-block">Resume CV (PDF only)</label>
            <input type="file" (change)="onResumeChange($event)" accept="application/pdf" class="form-control form-control-sm rounded-pill mb-2">
            <a *ngIf="profile.resumePath" [href]="assetUrl(profile.resumePath)" target="_blank" class="btn btn-outline-secondary btn-sm w-100 rounded-pill mt-2">
              <i class="far fa-file-pdf me-2"></i>View Existing CV
            </a>
          </div>

        </div>

        <div class="col-12 mt-4 pt-3 border-top">
          <button type="submit" [disabled]="profileForm.invalid || isSaving" class="btn btn-primary rounded-pill px-5 py-2 text-white fw-bold shadow">
            <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2" role="status"></span>
            Save Changes <i class="fas fa-save ms-2"></i>
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
