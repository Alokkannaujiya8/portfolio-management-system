<div class="container-fluid">
  <div class="row g-4">
    <!-- Add/Edit Form -->
    <div class="col-md-4">
      <div class="card border-0 shadow-sm rounded-4 p-4">
        <h5 class="text-dark fw-bold mb-4">{{ isEditMode ? 'Edit Experience' : 'Add Experience' }}</h5>
        
        <form (ngSubmit)="onSubmit()" #expForm="ngForm">
          <div class="mb-3">
            <label for="companyName" class="form-label fw-bold text-muted small">Company Name *</label>
            <input type="text" id="companyName" name="companyName" class="form-control rounded-3" placeholder="Company Name" required [(ngModel)]="model.companyName">
          </div>

          <div class="mb-3">
            <label for="role" class="form-label fw-bold text-muted small">Role/Job Title *</label>
            <input type="text" id="role" name="role" class="form-control rounded-3" placeholder="e.g. Lead Developer" required [(ngModel)]="model.role">
          </div>

          <div class="mb-3">
            <label for="startDate" class="form-label fw-bold text-muted small">Start Date *</label>
            <input type="date" id="startDate" name="startDate" class="form-control rounded-3" required [(ngModel)]="model.startDate">
          </div>

          <div class="mb-3">
            <label for="endDate" class="form-label fw-bold text-muted small">End Date (Leave blank if current)</label>
            <input type="date" id="endDate" name="endDate" class="form-control rounded-3" [(ngModel)]="model.endDate">
          </div>

          <div class="mb-4">
            <label for="description" class="form-label fw-bold text-muted small">Responsibilities/Description</label>
            <textarea id="description" name="description" class="form-control rounded-3" rows="4" placeholder="Briefly describe your duties..." [(ngModel)]="model.description"></textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" [disabled]="expForm.invalid || isSaving" class="btn btn-primary rounded-pill px-4 flex-grow-1">
              <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2"></span>
              {{ isEditMode ? 'Update' : 'Add' }}
            </button>
            <button *ngIf="isEditMode" type="button" (click)="onCancel()" class="btn btn-outline-secondary rounded-pill px-3">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Experiences List Table -->
    <div class="col-md-8">
      <div class="card border-0 shadow-sm rounded-4 p-4">
        <h5 class="text-dark fw-bold mb-4">Work Experience History</h5>

        <div *ngIf="successMessage" class="alert alert-success rounded-3 small py-2">{{ successMessage }}</div>
        <div *ngIf="errorMessage" class="alert alert-danger rounded-3 small py-2">{{ errorMessage }}</div>

        <div *ngIf="isLoading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
        </div>

        <div *ngIf="!isLoading" class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr class="small text-muted text-uppercase">
                <th>Company</th>
                <th>Role</th>
                <th>Period</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let exp of experiences">
                <td><strong>{{ exp.companyName }}</strong></td>
                <td>{{ exp.role }}</td>
                <td class="small">
                  {{ exp.startDate | date:'MMM yyyy' }} - 
                  <span *ngIf="exp.endDate">{{ exp.endDate | date:'MMM yyyy' }}</span>
                  <span *ngIf="!exp.endDate" class="badge bg-success-subtle text-success">Present</span>
                </td>
                <td class="text-end">
                  <button (click)="onEdit(exp)" class="btn btn-sm btn-outline-primary rounded-circle me-1" title="Edit">
                    <i class="fas fa-edit"></i>
                  </button>
                  <button (click)="onDelete(exp.experienceId)" class="btn btn-sm btn-outline-danger rounded-circle" title="Delete">
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
              <tr *ngIf="experiences.length === 0">
                <td colspan="4" class="text-center text-muted py-3">No work experiences added yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
